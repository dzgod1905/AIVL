# All-in-one stack for a SINGLE machine (local dev / demo). Everything on one
# private compose network. For multi-machine deployment use the per-stack files
# instead: ai-multi-agent/docker-compose.yml + automation-server/docker-compose.yml
# (see docs/deployment.md).
#
# Reads variables from the root `.env` file (copy .env.example).
# Required: REDIS_PASSWORD, ORCH_DB_PASSWORD, ORCH_API_TOKEN, AUTOMATION_API_TOKEN.
#
# Only the orchestrator API is published (on API_BIND, default 127.0.0.1).
# redis, orchestrator-db and automation-server have NO host port: they are
# reachable only inside the compose network by service name.
services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD}"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Orchestrator DB (Postgres), SEPARATE from the web's Neon DB. Holds per-step
  # input/output JSON. No published port (internal only).
  orchestrator-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=orch
      - POSTGRES_PASSWORD=${ORCH_DB_PASSWORD:?set ORCH_DB_PASSWORD}
      - POSTGRES_DB=orchestrator
    volumes:
      - orch-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orch -d orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 5

  automation-server:
    build: ./automation-server
    environment:
      - PORT=8002
      - AUTOMATION_API_TOKEN=${AUTOMATION_API_TOKEN:?set AUTOMATION_API_TOKEN}

  ai-multi-agent-api:
    build: ./ai-multi-agent
    ports:
      - "${API_BIND:-127.0.0.1}:8001:8001"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ORCH_DATABASE_URL=postgresql://orch:${ORCH_DB_PASSWORD}@orchestrator-db:5432/orchestrator
      - SQLITE_PATH=/data/orchestrator.db
      - AUTOMATION_SERVER_URL=http://automation-server:8002
      - ORCH_API_TOKEN=${ORCH_API_TOKEN:?set ORCH_API_TOKEN}
      - AUTOMATION_API_TOKEN=${AUTOMATION_API_TOKEN:?set AUTOMATION_API_TOKEN}
      # Concurrency gates. The engine runs in THIS api process, so set them here.
      #   SESSION_CONCURRENCY  : parallel sessions within one workflow.
      #   WORKFLOW_CONCURRENCY : distinct workflows running at once.
      - SESSION_CONCURRENCY=${SESSION_CONCURRENCY:-1}
      - WORKFLOW_CONCURRENCY=${WORKFLOW_CONCURRENCY:-1}
      # Optional: real ai_agent LLM calls (empty => dummy). Eager path runs here.
      - AI_AGENT_KEYS=${AI_AGENT_KEYS:-}
    volumes:
      - agent-data:/data
    depends_on:
      redis:
        condition: service_healthy
      orchestrator-db:
        condition: service_healthy
    command: ["uvicorn", "orchestrator.app:app", "--host", "0.0.0.0", "--port", "8001"]

  ai-multi-agent-workers:
    build: ./ai-multi-agent
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ORCH_DATABASE_URL=postgresql://orch:${ORCH_DB_PASSWORD}@orchestrator-db:5432/orchestrator
      - SQLITE_PATH=/data/orchestrator.db
      # Sized so the task pool never bottlenecks the api's two gates.
      - SESSION_CONCURRENCY=${SESSION_CONCURRENCY:-1}
      - WORKFLOW_CONCURRENCY=${WORKFLOW_CONCURRENCY:-1}
      # Optional: real ai_agent LLM calls (empty => dummy). Broker path runs here.
      - AI_AGENT_KEYS=${AI_AGENT_KEYS:-}
    volumes:
      - agent-data:/data
    depends_on:
      redis:
        condition: service_healthy
      orchestrator-db:
        condition: service_healthy
    # One container, all unit queues. worker.sh derives the queue set from the
    # registry and sizes the pool = WORKFLOW_CONCURRENCY x SESSION_CONCURRENCY.
    command: ["sh", "worker.sh"]

  # Optional HTTPS ingress (opt-in profile). Publishes the orchestrator API to the
  # internet over Cloudflare's edge WITHOUT opening a host firewall port: cloudflared
  # dials OUT to Cloudflare. Setup:
  #   1) Cloudflare Zero Trust > Networks > Tunnels > Create a tunnel (named).
  #   2) Add a Public Hostname (e.g. orch.yourdomain) -> Service http://ai-multi-agent-api:8001
  #   3) Copy the tunnel token into TUNNEL_TOKEN in .env.
  #   4) docker compose --profile tunnel up -d
  # Vercel then uses AI_MULTI_AGENT_URL=https://orch.yourdomain (+ matching ORCH_API_TOKEN).
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - ai-multi-agent-api

volumes:
  agent-data:
  orch-db-data:
